apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-application
  title: Create Application
  description: Request a new application environment through the Internal Developer Platform.
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Application information
      required:
        - name
        - owner
        - environment
      properties:
        name:
          title: Application name
          type: string
          description: Unique application name, for example demo-api.
          pattern: '^[a-z0-9-]+$'
        owner:
          title: Owner
          type: string
          description: Owner of the application.
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: Group
              metadata.namespace: default
        environment:
          title: Environment
          type: string
          enum:
            - local
            - dev
            - staging
            - prod
          default: local

  steps:
  - id: generate-xapp
    name: Generate XApp manifest
    action: fetch:template
    input:
      url: ./skeleton/xapp
      targetPath: environments/local/workloads/${{ parameters.name }}
      values:
        name: ${{ parameters.name }}
        owner: ${{ parameters.owner }}
        environment: ${{ parameters.environment }}

  - id: generate-catalog-entity
    name: Generate Backstage catalog entity
    action: fetch:template
    input:
      url: ./skeleton/catalog
      targetPath: catalog/workloads/${{ parameters.name }}
      values:
        name: ${{ parameters.name }}
        owner: ${{ parameters.owner }}
        environment: ${{ parameters.environment }}

  - id: publish
    name: Create GitOps pull request
    action: publish:github:pull-request
    input:
      repoUrl: github.com?owner=RonaldLePape&repo=internal-developer-platform-demo
      branchName: create-${{ parameters.name }}-xapp
      title: Create ${{ parameters.name }} application environment
      description: |
        Generated by the Internal Developer Platform.

        - Adds the XApp declaration
        - Adds the Backstage catalog entity

  - id: log
    name: Show generated request
    action: debug:log
    input:
      message: |
        Generated XApp manifest for ${{ parameters.name }}.

  output:
    text:
      - title: XApp manifest generated
        content: |
          Generated `xapp.yaml` for `${{ parameters.name }}`.
    links:
      - title: Pull Request
        url: ${{ steps.publish.output.remoteUrl }}
