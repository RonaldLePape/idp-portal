apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-application
  title: Create Application
  description: Request a new application environment through the Internal Developer Platform.
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Application information
      required:
        - name
        - owner
        - environment
      properties:
        name:
          title: Application name
          type: string
          description: Lowercase application name, for example demo-api.
          minLength: 3
          maxLength: 40
          pattern: '^[a-z][a-z0-9-]*[a-z0-9]$'
          ui:help: Use lowercase letters, digits and hyphens only.
        owner:
          title: Owner
          type: string
          description: Team responsible for the application.
          ui:field: EntityPicker
          ui:options:
            allowArbitraryValues: false
            catalogFilter:
              kind: Group
              metadata.namespace: default
        environment:
          title: Environment
          type: string
          enum:
            - local
            - dev
            - staging
            - prod
          default: local

  steps:
  - id: generate-xapp
    name: Generate XApp manifest
    action: fetch:template
    input:
      url: ./skeleton/xapp
      targetPath: environments/local/workloads/${{ parameters.name }}
      values:
        name: ${{ parameters.name }}
        owner: ${{ parameters.owner }}
        environment: ${{ parameters.environment }}

  - id: generate-catalog-entity
    name: Generate Backstage catalog entity
    action: fetch:template
    input:
      url: ./skeleton/catalog
      targetPath: catalog/workloads/${{ parameters.name }}
      values:
        name: ${{ parameters.name }}
        owner: ${{ parameters.owner }}
        environment: ${{ parameters.environment }}

  - id: publish
    name: Create GitOps pull request
    action: publish:github:pull-request
    input:
      repoUrl: github.com?owner=RonaldLePape&repo=internal-developer-platform-demo
      branchName: create-${{ parameters.name }}-xapp
      title: "feat(workload): provision ${{ parameters.name }}"
      description: |
        ## Application request

        Generated by the Internal Developer Platform.

        | Field | Value |
        |---|---|
        | Application | `${{ parameters.name }}` |
        | Owner | `${{ parameters.owner }}` |
        | Environment | `${{ parameters.environment }}` |

        ### Generated resources

        - `environments/local/workloads/${{ parameters.name }}/xapp.yaml`
        - `catalog/workloads/${{ parameters.name }}/catalog-info.yaml`
      commitMessage: "feat(workload): provision ${{ parameters.name }}"

  - id: log
    name: Show generated request
    action: debug:log
    input:
      message: |
        Generated XApp manifest for ${{ parameters.name }}.

  output:
    text:
      - title: Application request created
        content: |
          The provisioning request for `${{ parameters.name }}` has been created.

          Merge the Pull Request to start the GitOps reconciliation.

    links:
      - title: Review Pull Request
        url: ${{ steps.publish.output.remoteUrl }}

      - title: GitOps repository
        url: https://github.com/RonaldLePape/internal-developer-platform-demo
