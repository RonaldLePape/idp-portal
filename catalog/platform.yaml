apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: platform-team
  description: Team responsible for the Internal Developer Platform.
spec:
  type: team
  profile:
    displayName: Platform Team
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: ronald
spec:
  profile:
    displayName: Ronald Le Pape
  memberOf: [platform-team]
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: internal-developer-platform
  title: Internal Developer Platform
  description: Self-service platform for Kubernetes application environments.
spec:
  owner: platform-team
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: idp-portal
  title: IDP Portal
  description: Backstage-based developer portal for the Internal Developer Platform.
spec:
  type: website
  lifecycle: experimental
  owner: platform-team
  system: internal-developer-platform
  dependsOn:
    - component:argocd
    - component:crossplane
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: argocd
  title: Argo CD
  description: GitOps engine used by the platform.
spec:
  type: service
  lifecycle: experimental
  owner: platform-team
  system: internal-developer-platform
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: crossplane
  title: Crossplane
  description: Control plane used to implement the platform APIs.
spec:
  type: service
  lifecycle: experimental
  owner: platform-team
  system: internal-developer-platform
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: xapp-api
  title: XApp Platform API
  description: Platform API used to provision standardized application environments.
spec:
  type: openapi
  lifecycle: experimental
  owner: platform-team
  system: internal-developer-platform
  definition: |
    openapi: 3.0.0
    info:
      title: XApp Platform API
      version: v1alpha1
    paths: {}
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: platform-core
  title: Platform Core
  description: Core platform services exposing the XApp platform API.
spec:
  type: service
  lifecycle: production
  owner: platform-team
  system: internal-developer-platform

  dependsOn:
    - component:crossplane

  providesApis:
    - xapp-api
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: gitops-platform
  title: GitOps Platform
  description: GitOps reconciliation services.
spec:
  type: service
  lifecycle: production
  owner: platform-team
  system: internal-developer-platform

  dependsOn:
    - component:argocd
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: observability
  title: Observability
  description: Monitoring and observability services.
spec:
  type: service
  lifecycle: experimental
  owner: platform-team
  system: internal-developer-platform
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: demo-api
  title: Demo API
  description: Sample application provisioned through the Internal Developer Platform.
  annotations:
    github.com/project-slug: RonaldLePape/internal-developer-platform-demo
  links:
    - title: XApp Manifest
      url: https://github.com/RonaldLePape/internal-developer-platform-demo/tree/main/environments/local/workloads/demo-api
      icon: github
spec:
  type: service
  lifecycle: development

  owner: platform-team
  system: internal-developer-platform

  dependsOn:
    - api:xapp-api